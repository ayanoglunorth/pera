<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pera — Sınav Tanımla</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="stylesheet" href="pera-layout.css" />
</head>
<body class="app-body">
    <aside class="sidebar">
        <div class="logo-container"><i class="fa-solid fa-leaf"></i> Pera</div>
        <ul class="nav-menu">
            <li class="nav-item"><a href="Dashboard.html" class="nav-link"><i class="fa-solid fa-house"></i> Panel</a></li>
            <li class="nav-item"><a href="Exams.html" class="nav-link"><i class="fa-regular fa-file-lines"></i> Öğrenciler</a></li>
            <li class="nav-item"><a href="Grades.html" class="nav-link"><i class="fa-solid fa-user-group"></i> Eğitmenler</a></li>
            <li class="nav-item"><a href="Goals.html" class="nav-link"><i class="fa-regular fa-folder"></i> Performans</a></li>
            <li class="nav-item"><a href="Calendar.html" class="nav-link"><i class="fa-regular fa-calendar"></i> Sınavlar</a></li>
            <li class="nav-item active"><a href="ExamDefine.html" class="nav-link"><i class="fa-solid fa-plus-circle"></i> Sınav Tanımla</a></li>
            
            
            
            <li class="nav-item"><a href="Notifications.html" class="nav-link"><i class="fa-regular fa-bell"></i> Bildirimler</a></li>
            <li class="nav-item"><a href="Messages.html" class="nav-link"><i class="fa-regular fa-envelope"></i> Mesajlar</a></li>
            <li class="nav-item"><a href="Settings.html" class="nav-link"><i class="fa-solid fa-gear"></i> Ayarlar</a></li>
        </ul>
    </aside>

    <main class="main-content" style="justify-content: center;">
        <div style="width: 100%; max-width: 440px; margin: 0 auto;">
            <a href="Calendar.html" class="btn-ghost" style="display: inline-flex; align-items: center; gap: 8px; margin-bottom: 16px;">
                <i class="fa-solid fa-arrow-left"></i> Takvime dön
            </a>
            <div class="card stack">
                <div style="text-align: center; margin-bottom: 8px;">
                    <div style="width: 64px; height: 64px; margin: 0 auto 12px; border-radius: 50%; background: rgba(37,99,235,0.12); color: var(--primary-blue); display: flex; align-items: center; justify-content: center;">
                        <i class="fa-solid fa-calendar-plus fa-xl"></i>
                    </div>
                    <h1 class="page-title" style="font-size: 22px;">Yeni sınav / etkinlik</h1>
                    <p class="page-subtitle">Takvime kayıt ekle.</p>
                </div>
                <form id="tanimForm" class="stack-sm">
                    <div>
                        <label class="form-label">Etkinlik türü</label>
                        <select id="sinavTur" class="select-field">
                            <option value="Deneme">Deneme sınavı</option>
                            <option value="Yazili">Okul yazılısı</option>
                        </select>
                        <p class="form-hint">Denemeler analiz sistemine dahil edilir.</p>
                    </div>
                    <div>
                        <label class="form-label">Sınav adı</label>
                        <input type="text" id="sinavAdi" class="input-field" placeholder="Örn: Töder-1 veya Matematik 1. Yazılı" required />
                    </div>
                    <div>
                        <label class="form-label">Tarih</label>
                        <input type="date" id="sinavTarih" class="input-field" required />
                    </div>
                    <button type="submit" class="btn-primary" style="width: 100%; justify-content: center; margin-top: 8px;">
                        <i class="fa-solid fa-floppy-disk"></i> Takvime ekle
                    </button>
                </form>
            </div>
        </div>
    </main>

    <script>
        const baseUrl = "http://localhost:5268";

        function parseJwt(token) {
            try {
                return JSON.parse(decodeURIComponent(window.atob(token.split(".")[1].replace(/-/g, "+").replace(/_/g, "/")).split("").map(c => "%" + ("00" + c.charCodeAt(0).toString(16)).slice(-2)).join(""))));
            } catch (e) { return null; }
        }

        const selectedDate = localStorage.getItem("selectedDate");
        if (selectedDate) {
            document.getElementById("sinavTarih").value = selectedDate;
            localStorage.removeItem("selectedDate");
        }

        const token = localStorage.getItem("userToken");
        if (!token) { window.location.href = "Login.html"; }
        const user = parseJwt(token);
        if (!user) { localStorage.removeItem("userToken"); window.location.href = "Login.html"; }
        const role = user.role || user["http://schemas.microsoft.com/ws/2008/06/identity/claims/role"];
        if (role !== "Teacher") {
            alert("Bu sayfaya erişim yetkiniz yok.");
            window.location.href = "Dashboard.html";
        }

        document.getElementById("tanimForm").addEventListener("submit", async function (e) {
            e.preventDefault();
            const token = localStorage.getItem("userToken");
            const ad = document.getElementById("sinavAdi").value;
            const tarih = document.getElementById("sinavTarih").value;
            const tur = document.getElementById("sinavTur").value;
            try {
                const response = await fetch(`${baseUrl}/api/Exams/define`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "Authorization": `Bearer ${token}` },
                    body: JSON.stringify({ name: ad, date: tarih, type: tur })
                });
                if (response.ok) {
                    alert("Kayıt başarılı.");
                    window.location.href = "Calendar.html";
                } else alert("Hata oluştu.");
            } catch (error) {
                console.error(error);
                alert("Sunucu hatası.");
            }
        });
    </script>
</body>
</html>
